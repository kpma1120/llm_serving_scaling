version: "3.9"
services:
  vllm:
    build: ./vllm-server
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  streamlit:
    build: ./streamlit-app
    ports:
      - "8501:8501"
    environment:
      - VLLM_BASE_URL=http://vllm:8000/v1
    depends_on:
      - vllm
